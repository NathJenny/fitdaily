<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DuoSport</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100dvh;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
            padding-top: 70px; /* Espace pour le header compact */
        }

        /* --- NOUVEAU : Header Compact Fixe --- */
        #appHeader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 55px; /* Légèrement plus haut */
            background: rgba(18, 18, 18, 0.9);
            border-bottom: 1px solid #333;
            display: grid;
            grid-template-columns: 1fr auto 1fr; /* Grille pour centrage parfait du logo */
            align-items: center;
            padding: 0 15px;
            z-index: 20;
            backdrop-filter: blur(5px);
        }

        /* --- Logo Central --- */
        #logoContainer {
            grid-column: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app-logo {
            max-height: 32px;
            width: auto;
            border-radius: 50%;
        }

        /* --- NOUVEAU : Menu Burger à Droite --- */
        #menuBtn {
            grid-column: 3;
            justify-self: end;
            background: transparent;
            color: #fff;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #menuBtn:hover { background-color: rgba(255,255,255,0.1); }

        /* --- NOUVEAU : Menu déroulant caché --- */
        #appMenu {
            position: absolute;
            top: 60px; /* Juste sous le header */
            right: 15px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 30;
            width: 160px;
            display: flex;
            flex-direction: column;
            padding: 5px 0;
            transform-origin: top right;
            transition: transform 0.2s, opacity 0.2s;
            transform: scale(0.9);
            opacity: 0;
            pointer-events: none; /* Cache le menu */
        }
        #appMenu.active {
            transform: scale(1);
            opacity: 1;
            pointer-events: auto; /* Affiche le menu */
        }
        .menu-item {
            background: transparent;
            color: #fff;
            border: none;
            text-align: left;
            padding: 12px 15px;
            font-size: 14px;
            width: 100%;
            cursor: pointer;
        }
        .menu-item:hover { background-color: rgba(255,255,255,0.05); }

        /* Conteneur principal */
        .container {
            background: #1e1e1e;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 85%;
            width: 320px;
            z-index: 10;
        }
        h1 { 
            color: #ffffff; 
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .exercise-box {
            background: #2a2a2a;
            border: 1px solid #333;
            padding: 20px 15px;
            border-radius: 12px;
            margin: 15px 0 20px 0; /* Marge réduite pour rapprocher la flamme */
            font-size: 22px;
            font-weight: bold;
            color: #fff; /* Texte principal blanc */
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        /* --- NOUVEAU : Emplacement de la Flamme sous l'exercice --- */
        #streakDisplay {
            margin-bottom: 25px; /* Espace avant le bouton */
            font-size: 18px;
            font-weight: bold;
            color: #ffffff; /* Texte blanc pour contraste */
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: fadeInStreak 0.5s ease-out; /* Animation douce */
        }
        #streakCount {
            color: #4ade80; /* Le nombre de jours est vert néon */
        }

        button#doneBtn {
            background-color: #4ade80;
            color: #121212;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.2);
            width: 100%;
        }
        button#doneBtn:hover { 
            background-color: #22c55e; 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 222, 128, 0.3);
        }
        button#doneBtn:active { transform: translateY(1px); }
        button#doneBtn:disabled {
            background-color: #333;
            color: #777;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        @keyframes fadeInStreak {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header id="appHeader">
        <div style="width: 32px;"></div>
        
        <div id="logoContainer">
            <img src="icon.png" alt="DuoSport Logo" class="app-logo">
        </div>
        
        <button id="menuBtn">☰</button>

        <div id="appMenu">
            <button class="menu-item" id="resetStreakBtn">Réinitialiser la Série 🔥</button>
        </div>
    </header>

    <div class="container">
        <h1>Entraînement du Jour</h1>
        <div class="exercise-box" id="exerciseDisplay">...</div>

        <div id="streakDisplay">
            🔥 <span id="streakCount">0</span> jour(s) d'affilée
        </div>

        <button id="doneBtn">J'ai fait mon sport !</button>
    </div>

    <script>
        const exercices = [
            "Planche (1 minute)",
            "50 Squats",
            "La chaise (1 minute)",
            "3 séries de 15 Pompes",
            "4 séries de 20 Abdos"
        ];

        const phrasesCindy = [
            "Fais ton sport ! Cindy ne serait pas très fière si tu abandonnais maintenant...",
            "Tu veux que Cindy te voie comme un lâche ? Allez, fais tes exercices !",
            "Cindy croit en toi, ne la déçois pas aujourd'hui !",
            "Pense à Cindy, elle aime quand tu prends soin de toi. Go faire ton sport !",
            "C'est l'heure du sport ! Fais-le pour toi, mais surtout pour impressionner Cindy."
        ];

        const exerciseDisplay = document.getElementById('exerciseDisplay');
        const doneBtn = document.getElementById('doneBtn');
        const streakCount = document.getElementById('streakCount');
        const menuBtn = document.getElementById('menuBtn');
        const appMenu = document.getElementById('appMenu');
        const resetStreakBtn = document.getElementById('resetStreakBtn');

        const today = new Date().toISOString().split('T')[0];

        function initApp() {
            if (Notification.permission !== "granted") {
                Notification.requestPermission();
            }

            let savedDate = localStorage.getItem('exercise_date');
            let indexExercice = localStorage.getItem('exercise_index');

            if (savedDate !== today || indexExercice === null) {
                indexExercice = Math.floor(Math.random() * exercices.length);
                localStorage.setItem('exercise_date', today);
                localStorage.setItem('exercise_index', indexExercice);
            }
            
            exerciseDisplay.innerText = exercices[indexExercice];

            let streak = localStorage.getItem('sport_streak') || 0;
            streakCount.innerText = streak;

            if (localStorage.getItem('last_workout_date') === today) {
                verrouillerBouton();
            }

            planifierNotifications();
        }

        // --- NOUVEAU : Logique Menu Burger ---
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Empêche la fermeture immédiate
            appMenu.classList.toggle('active');
        });

        // Ferme le menu si on clique n'importe où ailleurs
        document.addEventListener('click', () => {
            appMenu.classList.remove('active');
        });

        function verrouillerBouton() {
            doneBtn.innerText = "Fait ✅";
            doneBtn.disabled = true;
        }

        doneBtn.addEventListener('click', () => {
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#4ade80', '#ffffff', '#22c55e']
            });

            localStorage.setItem('last_workout_date', today);
            
            let streak = parseInt(localStorage.getItem('sport_streak') || 0);
            streak++;
            localStorage.setItem('sport_streak', streak);
            streakCount.innerText = streak;

            verrouillerBouton();

            new Notification("Cindy est fière de toi ! ❤️", {
                body: "Série en cours : " + streak + " jours. Bien joué !",
                icon: "🔥"
            });
        });

        function envoyerRappel() {
            if (localStorage.getItem('last_workout_date') === today) return;

            if (Notification.permission === "granted") {
                const phraseAleatoire = phrasesCindy[Math.floor(Math.random() * phrasesCindy.length)];
                new Notification("Rappel Sport 🚨", { body: phraseAleatoire });
            }
        }

        // --- Logique Reset déplacée dans le menu contextuel ---
        resetStreakBtn.addEventListener('click', () => {
            if (confirm("Es-tu sûr de vouloir remettre ta série de jours à zéro ? 😢 Cindy ne serait pas fière...")) {
                localStorage.setItem('sport_streak', 0);
                streakCount.innerText = "0";
                localStorage.removeItem('last_workout_date');
                doneBtn.disabled = false;
                doneBtn.innerText = "J'ai fait mon sport !";
            }
            appMenu.classList.remove('active'); // Ferme le menu après reset
        });

        function planifierNotifications() {
            const maintenant = new Date();
            const creneaux = [
                { start: 8, end: 9 },
                { start: 12, end: 14 },
                { start: 18, end: 19 }
            ];

            creneaux.forEach(creneau => {
                let debut = new Date();
                debut.setHours(creneau.start, 0, 0, 0);
                
                let fin = new Date();
                fin.setHours(creneau.end, 0, 0, 0);

                if (maintenant > fin) {
                    debut.setDate(debut.getDate() + 1);
                    fin.setDate(fin.getDate() + 1);
                }

                let heureAleatoire = new Date(debut.getTime() + Math.random() * (fin.getTime() - debut.getTime()));
                let delai = heureAleatoire.getTime() - maintenant.getTime();

                if (delai > 0) {
                    setTimeout(envoyerRappel, delai);
                }
            });
        }

        initApp();
    </script>
</body>
</html>
