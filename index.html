<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DuoSport</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Aligne le contenu en haut pour laisser la place au header */
            height: 100dvh;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
            padding-top: 80px; /* Espace pour le header fixe + gap */
        }

        /* --- NOUVEAU : En-tête Compact Fixe --- */
        #appHeader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px; /* Hauteur définie */
            background: rgba(18, 18, 18, 0.9);
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            z-index: 20;
            backdrop-filter: blur(5px);
        }

        /* --- NOUVEAU : Logo Central --- */
        .app-logo {
            max-height: 30px; /* Rétréci pour tenir dans le header */
            width: auto;
            border-radius: 50%; /* Transforme le carré icon.png en cercle */
        }

        /* --- NOUVEAU : Éléments Rétrécis du Header --- */
        .header-streak {
            font-size: 16px; /* Réduit */
            font-weight: bold;
            color: #ffffff;
            background: rgba(30, 30, 30, 0.8);
            padding: 5px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #333;
        }

        .btn-icon-small {
            background: rgba(30, 30, 30, 0.8);
            color: #888;
            border: 1px solid #333;
            width: 34px; /* Shrunk */
            height: 34px; /* Shrunk */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px; /* Smaller icon */
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-icon-small:hover { color: #fff; border-color: #555; }

        /* Conteneur principal (compacté) */
        .container {
            background: #1e1e1e;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 85%;
            width: 320px;
            z-index: 10;
        }
        h1 { 
            color: #ffffff; 
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .exercise-box {
            background: #2a2a2a;
            border: 1px solid #333;
            padding: 20px 15px;
            border-radius: 12px;
            margin: 15px 0 25px 0;
            font-size: 22px;
            font-weight: bold;
            color: #4ade80;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        button {
            background-color: #4ade80;
            color: #121212;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.2);
            width: 100%;
        }
        button:hover { 
            background-color: #22c55e; 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 222, 128, 0.3);
        }
        button:active { transform: translateY(1px); }
        button:disabled {
            background-color: #333;
            color: #777;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
    </style>
</head>
<body>

    <header id="appHeader">
        <button id="resetStreakBtn" class="btn-icon-small" title="Remettre à zéro">🔄</button>
        
        <div id="logoContainer">
            <img src="icon.png" alt="DuoSport Logo" class="app-logo">
        </div>
        
        <div id="topStreak" class="header-streak">
            🔥 <span id="streakCount">0</span>
        </div>
    </header>

    <div class="container">
        <h1>Entraînement du Jour</h1>
        <div class="exercise-box" id="exerciseDisplay">...</div>
        <button id="doneBtn">J'ai fait mon sport !</button>
    </div>

    <script>
        const exercices = [
            "Planche (1 minute)",
            "50 Squats",
            "La chaise (1 minute)",
            "3 séries de 15 Pompes",
            "4 séries de 20 Abdos"
        ];

        const phrasesCindy = [
            "Fais ton sport ! Cindy ne serait pas très fière si tu abandonnais maintenant...",
            "Tu veux que Cindy te voie comme un lâche ? Allez, fais tes exercices !",
            "Cindy croit en toi, ne la déçois pas aujourd'hui !",
            "Pense à Cindy, elle aime quand tu prends soin de toi. Go faire ton sport !",
            "C'est l'heure du sport ! Fais-le pour toi, mais surtout pour impressionner Cindy."
        ];

        const exerciseDisplay = document.getElementById('exerciseDisplay');
        const doneBtn = document.getElementById('doneBtn');
        const streakCount = document.getElementById('streakCount');
        const today = new Date().toISOString().split('T')[0];

        function initApp() {
            if (Notification.permission !== "granted") {
                Notification.requestPermission();
            }

            let savedDate = localStorage.getItem('exercise_date');
            let indexExercice = localStorage.getItem('exercise_index');

            if (savedDate !== today || indexExercice === null) {
                indexExercice = Math.floor(Math.random() * exercices.length);
                localStorage.setItem('exercise_date', today);
                localStorage.setItem('exercise_index', indexExercice);
            }
            
            exerciseDisplay.innerText = exercices[indexExercice];

            let streak = localStorage.getItem('sport_streak') || 0;
            streakCount.innerText = streak;

            if (localStorage.getItem('last_workout_date') === today) {
                verrouillerBouton();
            }

            planifierNotifications();
        }

        function verrouillerBouton() {
            doneBtn.innerText = "Fait ✅";
            doneBtn.disabled = true;
        }

        doneBtn.addEventListener('click', () => {
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#4ade80', '#ffffff', '#22c55e']
            });

            localStorage.setItem('last_workout_date', today);
            
            let streak = parseInt(localStorage.getItem('sport_streak') || 0);
            streak++;
            localStorage.setItem('sport_streak', streak);
            streakCount.innerText = streak;

            verrouillerBouton();

            new Notification("Cindy est fière de toi ! ❤️", {
                body: "Série en cours : " + streak + " jours. Bien joué !",
                icon: "🔥"
            });
        });

        // Fonction pour envoyer la notification (utilisée par le programmateur aléatoire)
        function envoyerRappel() {
            if (localStorage.getItem('last_workout_date') === today) return;

            if (Notification.permission === "granted") {
                const phraseAleatoire = phrasesCindy[Math.floor(Math.random() * phrasesCindy.length)];
                new Notification("Rappel Sport 🚨", { body: phraseAleatoire });
            }
        }

        // --- Le bouton Test Notif a été supprimé ! ---

        // Bouton Reset Compteur (inchangé mais déplacé top-left)
        document.getElementById('resetStreakBtn').addEventListener('click', () => {
            if (confirm("Es-tu sûr de vouloir remettre ta série de jours à zéro ? 😢")) {
                localStorage.setItem('sport_streak', 0);
                streakCount.innerText = "0";
                localStorage.removeItem('last_workout_date');
                doneBtn.disabled = false;
                doneBtn.innerText = "J'ai fait mon sport !";
            }
        });

        function planifierNotifications() {
            const maintenant = new Date();
            const creneaux = [
                { start: 8, end: 9 },
                { start: 12, end: 14 },
                { start: 18, end: 19 }
            ];

            creneaux.forEach(creneau => {
                let debut = new Date();
                debut.setHours(creneau.start, 0, 0, 0);
                
                let fin = new Date();
                fin.setHours(creneau.end, 0, 0, 0);

                if (maintenant > fin) {
                    debut.setDate(debut.getDate() + 1);
                    fin.setDate(fin.getDate() + 1);
                }

                let heureAleatoire = new Date(debut.getTime() + Math.random() * (fin.getTime() - debut.getTime()));
                let delai = heureAleatoire.getTime() - maintenant.getTime();

                if (delai > 0) {
                    setTimeout(envoyerRappel, delai);
                }
            });
        }

        initApp();
    </script>
</body>
</html>
