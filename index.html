<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DuoSport</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100dvh;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
            padding-top: 70px;
        }

        /* --- Header Compact Fixe --- */
        #appHeader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 55px;
            background: rgba(18, 18, 18, 0.9);
            border-bottom: 1px solid #333;
            display: grid; grid-template-columns: 1fr auto 1fr;
            align-items: center; padding: 0 15px;
            z-index: 20; backdrop-filter: blur(5px);
            box-sizing: border-box;
        }
        #logoContainer { grid-column: 2; display: flex; justify-content: center; }
        .app-logo { max-height: 32px; width: auto; border-radius: 50%; }

        /* --- Menu Burger --- */
        #menuBtn {
            grid-column: 3; justify-self: end;
            background: transparent; color: #fff; border: none;
            font-size: 24px; cursor: pointer; padding: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        #appMenu {
            position: absolute; top: 60px; right: 15px;
            background: #1e1e1e; border: 1px solid #333;
            border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 30; width: 180px; display: flex; flex-direction: column;
            padding: 5px 0; transform-origin: top right;
            transition: transform 0.2s, opacity 0.2s;
            transform: scale(0.9); opacity: 0; pointer-events: none;
        }
        #appMenu.active { transform: scale(1); opacity: 1; pointer-events: auto; }
        .menu-item {
            background: transparent; color: #fff; border: none;
            text-align: left; padding: 12px 15px; font-size: 14px;
            width: 100%; cursor: pointer; border-bottom: 1px solid #2a2a2a;
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover { background-color: rgba(255,255,255,0.05); }

        /* --- Conteneur principal --- */
        .container {
            background: #1e1e1e; padding: 25px 20px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 85%; width: 320px; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
        }
        
        /* --- Humeur de Cindy --- */
        #cindyMood {
            background: #2a2a2a; color: #fff;
            padding: 8px 15px; border-radius: 30px;
            font-size: 14px; font-weight: 500;
            margin-bottom: 15px; border: 1px solid #333;
            display: flex; align-items: center; gap: 8px;
        }

        h1 { color: #ffffff; font-size: 18px; margin: 0 0 15px 0; text-transform: uppercase; }
        
        .exercise-box {
            background: #2a2a2a; border: 1px solid #333;
            padding: 20px 15px; border-radius: 12px;
            margin: 0 0 15px 0; font-size: 22px; font-weight: bold;
            color: #fff; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
            width: 100%; box-sizing: border-box;
        }

        /* --- Chronomètre --- */
        #timerContainer {
            display: none; /* Caché par défaut */
            background: #222; border: 1px solid #4ade80;
            border-radius: 10px; padding: 10px; margin-bottom: 15px;
            width: 100%; box-sizing: border-box;
            align-items: center; justify-content: space-between;
        }
        #timerDisplay { font-size: 20px; font-weight: bold; color: #4ade80; font-family: monospace; }
        #startTimerBtn {
            background: #4ade80; color: #121212; border: none;
            padding: 6px 12px; border-radius: 15px; font-weight: bold; cursor: pointer;
        }

        #streakDisplay {
            margin-bottom: 20px; font-size: 18px; font-weight: bold; color: #ffffff;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        #streakCount { color: #4ade80; }

        button#doneBtn {
            background-color: #4ade80; color: #121212; border: none;
            padding: 14px 24px; font-size: 16px; font-weight: bold;
            border-radius: 50px; cursor: pointer; transition: all 0.2s; width: 100%;
        }
        button#doneBtn:active { transform: translateY(1px); }
        button#doneBtn:disabled { background-color: #333; color: #777; cursor: not-allowed; }

        /* --- Fenêtres Modales (Badges & Historique) --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 50;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: #1e1e1e; width: 85%; max-height: 80vh;
            border-radius: 20px; padding: 20px; overflow-y: auto;
            border: 1px solid #333; position: relative;
        }
        .close-modal {
            position: absolute; top: 15px; right: 15px;
            background: none; border: none; color: #fff; font-size: 24px; cursor: pointer;
        }
        .modal h2 { margin-top: 0; color: #4ade80; font-size: 20px; }

        /* Grille Badges */
        .badge-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px;
        }
        .badge {
            background: #2a2a2a; border-radius: 10px; padding: 10px 5px;
            text-align: center; opacity: 0.4; filter: grayscale(100%);
            border: 1px solid #333; transition: all 0.3s;
        }
        .badge.unlocked { opacity: 1; filter: none; border-color: #4ade80; box-shadow: 0 0 10px rgba(74, 222, 128, 0.1); }
        .badge-icon { font-size: 24px; margin-bottom: 5px; }
        .badge-title { font-size: 10px; font-weight: bold; color: #fff; line-height: 1.2; }
        
        /* Calendrier */
        .calendar-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day-name { font-size: 10px; color: #888; text-transform: uppercase; }
        .cal-day {
            aspect-ratio: 1; background: #2a2a2a; border-radius: 5px;
            display: flex; justify-content: center; align-items: center; font-size: 12px;
        }
        .cal-day.done { background: #4ade80; color: #121212; font-weight: bold; }
        .cal-day.empty { background: transparent; }
    </style>
</head>
<body>

    <header id="appHeader">
        <div style="width: 32px;"></div>
        <div id="logoContainer"><img src="icon.png" alt="DuoSport Logo" class="app-logo" onerror="this.style.display='none'"></div>
        <button id="menuBtn">☰</button>

        <div id="appMenu">
            <button class="menu-item" id="openBadgesBtn">🏆 Mes Badges</button>
            <button class="menu-item" id="openHistoryBtn">📅 Mon Historique</button>
            <button class="menu-item" id="resetStreakBtn" style="color:#ff4757;">⚠️ Reset Série</button>
        </div>
    </header>

    <div class="container">
        <div id="cindyMood">😐 Cindy charge son humeur...</div>

        <h1>Entraînement du Jour</h1>
        <div class="exercise-box" id="exerciseDisplay">...</div>

        <div id="timerContainer">
            <span id="timerDisplay">01:00</span>
            <button id="startTimerBtn">▶ Lancer</button>
        </div>

        <div id="streakDisplay">🔥 <span id="streakCount">0</span> jour(s)</div>
        <button id="doneBtn">J'ai fait mon sport !</button>
    </div>

    <div class="modal" id="badgesModal">
        <div class="modal-content">
            <button class="close-modal" onclick="document.getElementById('badgesModal').classList.remove('active')">×</button>
            <h2>Mes Badges</h2>
            <p style="font-size: 12px; color: #888;">Complète des entraînements pour les débloquer !</p>
            <div class="badge-grid" id="badgeGrid"></div>
        </div>
    </div>

    <div class="modal" id="historyModal">
        <div class="modal-content">
            <button class="close-modal" onclick="document.getElementById('historyModal').classList.remove('active')">×</button>
            <h2 id="calendarTitle">Ce Mois-ci</h2>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
    </div>

    <script>
        // --- DONNÉES ---
        const exercices = [
            "Planche (1 minute)", "50 Squats", "La chaise (1 minute)", 
            "3 séries de 15 Pompes", "4 séries de 20 Abdos"
        ];

        // Définition des 15 badges
        const badgesDef = [
            { id: 'str_1', icon: '🌱', title: '1er Pas', desc: '1 jour' },
            { id: 'str_3', icon: '🔥', title: 'Échauffement', desc: '3 jrs' },
            { id: 'str_7', icon: '⭐', title: '1 Semaine', desc: '7 jrs' },
            { id: 'str_14', icon: '💪', title: '2 Semaines', desc: '14 jrs' },
            { id: 'str_21', icon: '🧠', title: 'Habitude', desc: '21 jrs' },
            { id: 'str_30', icon: '🏆', title: 'Guerrier', desc: '1 mois' },
            { id: 'str_40', icon: '🚀', title: 'Inarrêtable', desc: '40 jrs' },
            { id: 'str_50', icon: '👑', title: 'Légende', desc: '50 jrs' },
            { id: 'tot_10', icon: '🥉', title: 'Apprenti', desc: '10 sports' },
            { id: 'tot_25', icon: '🥈', title: 'Amateur', desc: '25 sports' },
            { id: 'tot_50', icon: '🥇', title: 'Pro', desc: '50 sports' },
            { id: 'tot_100', icon: '💎', title: 'Vétéran', desc: '100 sports' },
            { id: 'early', icon: '🌅', title: 'Lève-tôt', desc: 'Avant 8h' },
            { id: 'late', icon: '🦉', title: 'Oiseau Nuit', desc: 'Après 20h' },
            { id: 'we', icon: '🎉', title: 'Sans Repos', desc: 'Un weekend' }
        ];

        // --- ÉLÉMENTS DOM ---
        const doneBtn = document.getElementById('doneBtn');
        const streakCount = document.getElementById('streakCount');
        const cindyMood = document.getElementById('cindyMood');
        const appMenu = document.getElementById('appMenu');
        const timerContainer = document.getElementById('timerContainer');
        const timerDisplay = document.getElementById('timerDisplay');
        const startTimerBtn = document.getElementById('startTimerBtn');
        
        // --- VARIABLES GLOBALES ---
        const todayStr = new Date().toISOString().split('T')[0];
        let timerInterval;

        // --- INITIALISATION ---
        function initApp() {
            // Choix de l'exercice
            let savedDate = localStorage.getItem('exercise_date');
            let indexExercice = localStorage.getItem('exercise_index');
            if (savedDate !== todayStr || indexExercice === null) {
                indexExercice = Math.floor(Math.random() * exercices.length);
                localStorage.setItem('exercise_date', todayStr);
                localStorage.setItem('exercise_index', indexExercice);
            }
            
            const exName = exercices[indexExercice];
            document.getElementById('exerciseDisplay').innerText = exName;

            // Afficher chrono si besoin
            if (exName.includes("1 minute")) {
                timerContainer.style.display = "flex";
            }

            // Charger série et UI
            let streak = parseInt(localStorage.getItem('sport_streak') || 0);
            streakCount.innerText = streak;
            updateCindyMood(streak);

            if (localStorage.getItem('last_workout_date') === todayStr) {
                verrouillerBouton();
            }
        }

        // --- HUMEUR DE CINDY ---
        function updateCindyMood(streak) {
            let mood = "";
            if (streak === 0) mood = "😠 Cindy est très déçue...";
            else if (streak < 3) mood = "😐 Cindy observe tes efforts.";
            else if (streak < 7) mood = "🙂 Cindy commence à y croire !";
            else if (streak < 14) mood = "😊 Cindy est fière de toi !";
            else if (streak < 30) mood = "😍 Cindy est impressionnée !";
            else if (streak < 50) mood = "🔥 Cindy parle de toi à tout le monde !";
            else mood = "👑 Cindy est ta plus grande fan absolue !";
            cindyMood.innerText = mood;
        }

        // --- CHRONOMÈTRE ---
        startTimerBtn.addEventListener('click', () => {
            if (startTimerBtn.disabled) return;
            startTimerBtn.disabled = true;
            let timeLeft = 60;
            timerDisplay.style.color = "#ffffff";
            
            timerInterval = setInterval(() => {
                timeLeft--;
                let sec = timeLeft < 10 ? "0" + timeLeft : timeLeft;
                timerDisplay.innerText = "00:" + sec;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerDisplay.innerText = "Terminé !";
                    timerDisplay.style.color = "#4ade80";
                    playSuccessSound(); // Petit bip de fin
                }
            }, 1000);
        });

        // --- SON DE VALIDATION (Web Audio API) ---
        function playSuccessSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime); // Note A5
                osc.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + 0.1); // Monte à A6
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.2);
            } catch(e) { console.log("Son non supporté"); }
        }

        // --- BOUTON PRINCIPAL ---
        function verrouillerBouton() {
            doneBtn.innerText = "Fait ✅";
            doneBtn.disabled = true;
            timerContainer.style.display = "none"; // Cache chrono si fait
        }

        doneBtn.addEventListener('click', () => {
            playSuccessSound();
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#4ade80', '#ffffff', '#22c55e'] });

            // Sauvegarde de l'historique
            let history = JSON.parse(localStorage.getItem('workout_history') || '[]');
            if (!history.includes(todayStr)) {
                history.push(todayStr);
                localStorage.setItem('workout_history', JSON.stringify(history));
            }

            // Sauvegarde série
            localStorage.setItem('last_workout_date', todayStr);
            let streak = parseInt(localStorage.getItem('sport_streak') || 0) + 1;
            localStorage.setItem('sport_streak', streak);
            streakCount.innerText = streak;
            
            // Stats totales
            let total = parseInt(localStorage.getItem('total_workouts') || 0) + 1;
            localStorage.setItem('total_workouts', total);

            verrouillerBouton();
            updateCindyMood(streak);
            checkBadges(streak, total);
        });

        // --- SYSTÈME DE BADGES ---
        function checkBadges(streak, total) {
            let unlocked = JSON.parse(localStorage.getItem('unlocked_badges') || '[]');
            const now = new Date();
            const hour = now.getHours();
            const day = now.getDay(); // 0 = Dimanche, 6 = Samedi
            
            let newlyUnlocked = false;

            // Vérifions les conditions
            if (streak >= 1 && !unlocked.includes('str_1')) unlocked.push('str_1');
            if (streak >= 3 && !unlocked.includes('str_3')) unlocked.push('str_3');
            if (streak >= 7 && !unlocked.includes('str_7')) unlocked.push('str_7');
            if (streak >= 14 && !unlocked.includes('str_14')) unlocked.push('str_14');
            if (streak >= 21 && !unlocked.includes('str_21')) unlocked.push('str_21');
            if (streak >= 30 && !unlocked.includes('str_30')) unlocked.push('str_30');
            if (streak >= 40 && !unlocked.includes('str_40')) unlocked.push('str_40');
            if (streak >= 50 && !unlocked.includes('str_50')) unlocked.push('str_50');
            
            if (total >= 10 && !unlocked.includes('tot_10')) unlocked.push('tot_10');
            if (total >= 25 && !unlocked.includes('tot_25')) unlocked.push('tot_25');
            if (total >= 50 && !unlocked.includes('tot_50')) unlocked.push('tot_50');
            if (total >= 100 && !unlocked.includes('tot_100')) unlocked.push('tot_100');

            if (hour < 8 && !unlocked.includes('early')) unlocked.push('early');
            if (hour >= 20 && !unlocked.includes('late')) unlocked.push('late');
            if ((day === 0 || day === 6) && !unlocked.includes('we')) unlocked.push('we');

            localStorage.setItem('unlocked_badges', JSON.stringify(unlocked));
        }

        function renderBadges() {
            const grid = document.getElementById('badgeGrid');
            grid.innerHTML = '';
            let unlocked = JSON.parse(localStorage.getItem('unlocked_badges') || '[]');
            
            badgesDef.forEach(b => {
                const isUnlocked = unlocked.includes(b.id);
                const div = document.createElement('div');
                div.className = `badge ${isUnlocked ? 'unlocked' : ''}`;
                div.innerHTML = `<div class="badge-icon">${b.icon}</div><div class="badge-title">${b.title}</div>`;
                grid.appendChild(div);
            });
        }

        // --- CALENDRIER ---
        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            const history = JSON.parse(localStorage.getItem('workout_history') || '[]');
            
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            
            const monthNames = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
            document.getElementById('calendarTitle').innerText = `${monthNames[month]} ${year}`;

            // Jours de la semaine
            ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'].forEach(d => {
                let el = document.createElement('div');
                el.className = 'day-name'; el.innerText = d;
                grid.appendChild(el);
            });

            // Calcul des jours
            let firstDay = new Date(year, month, 1).getDay(); // 0 = Dimanche
            firstDay = firstDay === 0 ? 6 : firstDay - 1; // Ajuster pour Lundi = 0
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // Cases vides avant le 1er du mois
            for (let i = 0; i < firstDay; i++) {
                let empty = document.createElement('div');
                empty.className = 'cal-day empty';
                grid.appendChild(empty);
            }

            // Jours du mois
            for (let i = 1; i <= daysInMonth; i++) {
                let dayDiv = document.createElement('div');
                dayDiv.className = 'cal-day';
                dayDiv.innerText = i;
                
                // Formater la date en YYYY-MM-DD
                let mStr = (month + 1).toString().padStart(2, '0');
                let dStr = i.toString().padStart(2, '0');
                let dateStr = `${year}-${mStr}-${dStr}`;

                if (history.includes(dateStr)) dayDiv.classList.add('done');
                grid.appendChild(dayDiv);
            }
        }

        // --- GESTION DU MENU ET DES MODALES ---
        document.getElementById('menuBtn').addEventListener('click', (e) => {
            e.stopPropagation(); appMenu.classList.toggle('active');
        });
        document.addEventListener('click', () => { appMenu.classList.remove('active'); });

        document.getElementById('resetStreakBtn').addEventListener('click', () => {
            if (confirm("Remettre la série à zéro ? 😢 Cindy va être très déçue...")) {
                localStorage.setItem('sport_streak', 0);
                localStorage.removeItem('last_workout_date'); // Permet de re-valider
                location.reload(); // Recharge la page
            }
        });

        document.getElementById('openBadgesBtn').addEventListener('click', () => {
            renderBadges();
            document.getElementById('badgesModal').classList.add('active');
        });

        document.getElementById('openHistoryBtn').addEventListener('click', () => {
            renderCalendar();
            document.getElementById('historyModal').classList.add('active');
        });

        initApp();
    </script>
</body>
</html>
